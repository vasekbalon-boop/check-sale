# Save as .github/workflows/sale-watch.yml
name: BG3 sale watch

on:
  schedule:
    - - cron: "17 7 * * *"    # 09:17 CEST / 08:17 CET
  workflow_dispatch:          # lets you trigger a test run from the Actions tab
    inputs:
      force:
        description: "Send a test notification regardless of discount"
        type: boolean
        default: false

permissions:
  contents: write             # needed to commit state.json back

concurrency:
  group: sale-watch
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check Steam price
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TARGET_USER_ID: ${{ secrets.TARGET_USER_ID }}
          STEAM_APP_ID: "1086940"
          STEAM_CC: "cz"
          MIN_DISCOUNT: "20"
          FORCE_NOTIFY: ${{ inputs.force }}
        run: python check_sale.py

      - name: Persist state
        run: |
          git config user.name  "sale-watch[bot]"
          git config user.email "sale-watch@users.noreply.github.com"
          git add state.json
          git diff --staged --quiet || git commit -m "state: $(date -u +%F\ %H:%M)"
          git push
